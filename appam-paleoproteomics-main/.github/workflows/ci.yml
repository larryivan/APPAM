name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install snakemake

      - name: Lint workflow
        run: snakemake --lint || true

      - name: Run unit tests
        run: python3 -m unittest discover -s .test/unit -p 'test_*.py' -v

      - name: Run integration tests
        run: python3 -m unittest discover -s .test/integration -p 'test_*.py' -v

      - name: Run Snakemake dry-run
        run: snakemake -n --cores 1
