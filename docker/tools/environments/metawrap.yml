name: metawrap
channels:
  - defaults
  - bioconda
  - conda-forge
dependencies:
  # APPAM-SMK only needs the metaWRAP wrapper scripts plus the Python helpers
  # used by binning/bin_refinement. The wrapped binaries themselves are
  # provided by APPAM's other environments and exposed through appam-tool.
  - python=2.7.15
  - biopython=1.72
